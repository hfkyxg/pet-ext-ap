<svg xmlns="http://www.w3.org/2000/svg" width="680" height="200" viewBox="0 0 680 200">
  <defs>
    <style>
      text { font-family: 'Courier New', monospace; }
      @keyframes idle-bounce {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(-5px); }
      }
      @keyframes happy-bounce {
        0%,100% { transform: translateY(0) scale(1); }
        30%     { transform: translateY(-18px) scale(1.15); }
        60%     { transform: translateY(-8px) scale(1.05); }
      }
      @keyframes sleep-breathe {
        0%,100% { transform: scaleY(1); }
        50%     { transform: scaleY(0.92); }
      }
      @keyframes excited-shake {
        0%,100% { transform: translateX(0); }
        25%     { transform: translateX(-4px); }
        75%     { transform: translateX(4px); }
      }
      @keyframes float-zzz {
        0%   { opacity:0; transform:translate(0,0) scale(0.5); }
        30%  { opacity:1; }
        100% { opacity:0; transform:translate(16px,-22px) scale(1); }
      }
      @keyframes heart-pop {
        0%   { opacity:0; transform:translate(0,0) scale(0.4); }
        30%  { opacity:1; transform:translate(0,-8px) scale(1.2); }
        100% { opacity:0; transform:translate(5px,-22px) scale(0.8); }
      }
      .state-idle    { animation: idle-bounce    1.4s ease-in-out infinite; }
      .state-happy   { animation: happy-bounce   0.7s ease-in-out infinite; }
      .state-sleep   { animation: sleep-breathe  2.5s ease-in-out infinite; }
      .state-excited { animation: excited-shake  0.3s ease-in-out infinite; }
      .zzz1 { animation: float-zzz 2.0s ease-out 0.0s infinite; }
      .zzz2 { animation: float-zzz 2.0s ease-out 0.7s infinite; }
      .heart1 { animation: heart-pop 1.2s ease-out 0.0s infinite; }
      .heart2 { animation: heart-pop 1.2s ease-out 0.4s infinite; }
    </style>
  </defs>

  <rect width="680" height="200" rx="14" fill="#0f0f17"/>

  <!-- Títulos dos estados -->
  <text x="72"  y="18" text-anchor="middle" font-size="11" fill="#7a7a9a">Idle</text>
  <text x="210" y="18" text-anchor="middle" font-size="11" fill="#f1c40f">Happy</text>
  <text x="350" y="18" text-anchor="middle" font-size="11" fill="#3498db">Sleeping</text>
  <text x="490" y="18" text-anchor="middle" font-size="11" fill="#e74c3c">Excited</text>
  <text x="618" y="18" text-anchor="middle" font-size="11" fill="#2ecc71">Waving</text>

