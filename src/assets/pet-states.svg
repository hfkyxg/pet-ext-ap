<svg xmlns="http://www.w3.org/2000/svg" width="820" height="270" viewBox="0 0 820 270" role="img" aria-labelledby="title desc">
  <title id="title">Modelos e expressões pixel-art do Claw'd</title>
  <desc id="desc">Quatro cartões mostram os modelos Clássico, Mini, Pinças e Guardião com quatro estilos de rosto.</desc>
  <defs>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity=".4"/>
    </filter>
    <style>
      text { font-family: "Courier New", monospace; }
      .card { fill: #171a2b; stroke: #303755; stroke-width: 1; }
      .pixel { shape-rendering: crispEdges; filter: url(#soft); }
      .index { fill: #ff5268; font-size: 10px; font-weight: 900; letter-spacing: 1px; }
      .name { fill: #f7f8ff; font-size: 15px; font-weight: 900; }
      .face { fill: #99a2c9; font-size: 11px; font-weight: 700; }
      .desc { fill: #737ca5; font-size: 10px; }
      @media (prefers-reduced-motion: no-preference) {
        .pet { animation: clawd-gallery-bob 3s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
        .card:nth-of-type(2) .pet { animation-delay: -.6s; }
        .card:nth-of-type(3) .pet { animation-delay: -1.2s; }
        .card:nth-of-type(4) .pet { animation-delay: -1.8s; }
      }
      @keyframes clawd-gallery-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    </style>
  </defs>

  <rect width="820" height="270" rx="16" fill="#0d0f19"/>
  <text x="22" y="28" fill="#ffffff" font-size="17" font-weight="900">MODELOS × ROSTOS</text>
  <text x="798" y="28" text-anchor="end" fill="#6f789e" font-size="11">cada combinação preserva a grade 4 px</text>

  <g class="card" transform="translate(18 46)">
    <rect width="190" height="174" rx="12"/>
    <text x="14" y="22" class="index">01</text>
    <g class="pixel pet" color="#e11920" transform="translate(47.4 30) scale(1.7)"><g id="classic"><path fill="currentColor" d="M0 4h8v4h-8zM48 4h8v4h-8zM0 8h8v4h-8zM48 8h8v4h-8zM4 12h8v4h-8zM44 12h8v4h-8z"/><path fill="currentColor" d="M16 8h24v4h-24zM16 12h24v4h-24zM16 16h24v4h-24zM8 20h40v4h-40zM8 24h4v4h-4zM20 24h16v4h-16zM44 24h4v4h-4zM8 28h4v4h-4zM20 28h16v4h-16zM44 28h4v4h-4zM8 32h16v4h-16zM32 32h16v4h-16zM8 36h40v4h-40zM16 40h24v4h-24z"/><path fill="#8f0f16" d="M8 40h8v4h-8zM40 40h8v4h-8z"/><path fill="#5c0a0e" d="M12 44h8v4h-8zM36 44h8v4h-8z"/><path fill="#7a0c12" d="M24 32h8v4h-8z"/><path fill="#ffffff" d="M12 24h8v4h-8zM36 24h8v4h-8zM12 28h4v4h-4zM36 28h4v4h-4z"/><path fill="#10121f" d="M16 28h4v4h-4zM40 28h4v4h-4z"/></g></g>
    <text x="95" y="132" text-anchor="middle" class="name">CLÁSSICO</text>
    <text x="95" y="150" text-anchor="middle" class="face">ROSTO CLÁSSICO</text>
    <text x="95" y="165" text-anchor="middle" class="desc">fiel à referência</text>
  </g>
  <g class="card" transform="translate(216 46)">
    <rect width="190" height="174" rx="12"/>
    <text x="14" y="22" class="index">02</text>
    <g class="pixel pet" color="#ff9f43" transform="translate(47.4 30) scale(1.7)"><g id="mini"><path fill="currentColor" d="M0 4h8v4h-8zM48 4h8v4h-8zM0 8h8v4h-8zM48 8h8v4h-8zM4 12h8v4h-8zM44 12h8v4h-8z"/><path fill="currentColor" d="M16 8h24v4h-24zM16 12h24v4h-24zM16 16h24v4h-24zM12 20h32v4h-32zM20 24h16v4h-16zM20 28h16v4h-16zM12 32h12v4h-12zM32 32h12v4h-12zM12 36h32v4h-32zM16 40h24v4h-24z"/><path fill="#c9721f" d="M12 40h4v4h-4zM40 40h4v4h-4z"/><path fill="#7a3d0f" d="M12 44h8v4h-8zM36 44h8v4h-8z"/><path fill="#a35415" d="M24 32h8v4h-8z"/><path fill="#ffffff" d="M16 24h4v4h-4zM40 24h4v4h-4zM12 28h4v4h-4zM36 28h4v4h-4z"/><path fill="#10121f" d="M16 28h4v4h-4zM40 28h4v4h-4z"/><path fill="#fff3d6" d="M12 24h4v4h-4zM36 24h4v4h-4z"/></g></g>
    <text x="95" y="132" text-anchor="middle" class="name">MINI</text>
    <text x="95" y="150" text-anchor="middle" class="face">ROSTO BRILHO</text>
    <text x="95" y="165" text-anchor="middle" class="desc">compacto e expressivo</text>
  </g>
  <g class="card" transform="translate(414 46)">
    <rect width="190" height="174" rx="12"/>
    <text x="14" y="22" class="index">03</text>
    <g class="pixel pet" color="#35a7ff" transform="translate(47.4 30) scale(1.7)"><g id="claws"><path fill="currentColor" d="M0 4h8v4h-8zM48 4h8v4h-8zM0 8h8v4h-8zM48 8h8v4h-8zM0 12h12v4h-12zM44 12h12v4h-12zM0 16h8v4h-8zM48 16h8v4h-8z"/><path fill="currentColor" d="M16 8h24v4h-24zM16 12h24v4h-24zM16 16h24v4h-24zM8 20h4v4h-4zM20 20h16v4h-16zM44 20h4v4h-4zM8 24h8v4h-8zM20 24h20v4h-20zM44 24h4v4h-4zM8 28h4v4h-4zM20 28h16v4h-16zM44 28h4v4h-4zM8 32h16v4h-16zM32 32h16v4h-16zM8 36h40v4h-40zM16 40h24v4h-24z"/><path fill="#1f6fbf" d="M12 20h8v4h-8zM36 20h8v4h-8zM8 40h8v4h-8zM40 40h8v4h-8z"/><path fill="#0f3f72" d="M12 44h8v4h-8zM36 44h8v4h-8z"/><path fill="#155a9c" d="M24 32h8v4h-8z"/><path fill="#ffffff" d="M12 28h4v4h-4zM36 28h4v4h-4z"/><path fill="#10121f" d="M16 24h4v4h-4zM40 24h4v4h-4zM16 28h4v4h-4zM40 28h4v4h-4z"/></g></g>
    <text x="95" y="132" text-anchor="middle" class="name">PINÇAS</text>
    <text x="95" y="150" text-anchor="middle" class="face">ROSTO FOCADO</text>
    <text x="95" y="165" text-anchor="middle" class="desc">alcance lateral maior</text>
  </g>
  <g class="card" transform="translate(612 46)">
    <rect width="190" height="174" rx="12"/>
    <text x="14" y="22" class="index">04</text>
    <g class="pixel pet" color="#a66cff" transform="translate(47.4 30) scale(1.7)"><g id="guardian"><path fill="currentColor" d="M0 4h8v4h-8zM48 4h8v4h-8zM0 8h8v4h-8zM48 8h8v4h-8zM4 12h8v4h-8zM44 12h8v4h-8z"/><path fill="currentColor" d="M12 8h32v4h-32zM16 12h24v4h-24zM16 16h24v4h-24zM8 20h40v4h-40zM8 24h40v4h-40zM8 28h4v4h-4zM20 28h16v4h-16zM44 28h4v4h-4zM8 32h16v4h-16zM32 32h16v4h-16zM8 36h40v4h-40zM16 40h24v4h-24z"/><path fill="#6f42c9" d="M16 4h24v4h-24zM8 40h8v4h-8zM40 40h8v4h-8zM8 44h4v4h-4zM44 44h4v4h-4z"/><path fill="#39236b" d="M12 44h8v4h-8zM36 44h8v4h-8z"/><path fill="#4f2f94" d="M24 32h8v4h-8z"/><path fill="#10121f" d="M12 28h8v4h-8zM36 28h8v4h-8z"/></g></g>
    <text x="95" y="132" text-anchor="middle" class="name">GUARDIÃO</text>
    <text x="95" y="150" text-anchor="middle" class="face">ROSTO SONOLENTO</text>
    <text x="95" y="165" text-anchor="middle" class="desc">silhueta mais robusta</text>
  </g>

  <g transform="translate(18 238)">
    <rect width="4" height="12" fill="#ff5268"/>
    <text x="14" y="10" fill="#9aa3c9" font-size="11">CORPO ESTÁTICO</text>
    <rect x="160" width="4" height="12" fill="#ff5268"/>
    <text x="174" y="10" fill="#9aa3c9" font-size="11">PERNAS SEPARADAS</text>
    <rect x="340" width="4" height="12" fill="#ff5268"/>
    <text x="354" y="10" fill="#9aa3c9" font-size="11">OLHOS CUSTOMIZÁVEIS</text>
    <rect x="558" width="4" height="12" fill="#ff5268"/>
    <text x="572" y="10" fill="#9aa3c9" font-size="11">SKINS + 2 SLOTS</text>
  </g>
</svg>
