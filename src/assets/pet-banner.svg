      <text x="54" y="112" text-anchor="middle" class="model-name">CLÁSSICO</text>
    </g>
    <g transform="translate(120 14)">
      <rect class="model-card" width="108" height="126" rx="10"/>
      <g class="pixel pet-bob" color="#ff9f43" transform="translate(26 20)"><g><path fill="currentColor" d="M0 4h8v4h-8zM48 4h8v4h-8zM0 8h8v4h-8zM48 8h8v4h-8zM4 12h8v4h-8zM44 12h8v4h-8z"/><path fill="currentColor" d="M16 8h24v4h-24zM16 12h24v4h-24zM16 16h24v4h-24zM12 20h32v4h-32zM20 24h16v4h-16zM20 28h16v4h-16zM12 32h12v4h-12zM32 32h12v4h-12zM12 36h32v4h-32zM16 40h24v4h-24z"/><path fill="#c9721f" d="M12 40h4v4h-4zM40 40h4v4h-4z"/><path fill="#7a3d0f" d="M12 44h8v4h-8zM36 44h8v4h-8z"/><path fill="#a35415" d="M24 32h8v4h-8z"/><path fill="#ffffff" d="M16 24h4v4h-4zM40 24h4v4h-4zM12 28h4v4h-4zM36 28h4v4h-4z"/><path fill="#10121f" d="M16 28h4v4h-4zM40 28h4v4h-4z"/><path fill="#fff3d6" d="M12 24h4v4h-4zM36 24h4v4h-4z"/></g></g>
      <text x="54" y="112" text-anchor="middle" class="model-name">MINI</text>
    </g>
    <g transform="translate(240 14)">
      <rect class="model-card" width="108" height="126" rx="10"/>
      <g class="pixel pet-bob" color="#35a7ff" transform="translate(26 20)"><g><path fill="currentColor" d="M0 4h8v4h-8zM48 4h8v4h-8zM0 8h8v4h-8zM48 8h8v4h-8zM0 12h12v4h-12zM44 12h12v4h-12zM0 16h8v4h-8zM48 16h8v4h-8z"/><path fill="currentColor" d="M16 8h24v4h-24zM16 12h24v4h-24zM16 16h24v4h-24zM8 20h4v4h-4zM20 20h16v4h-16zM44 20h4v4h-4zM8 24h8v4h-8zM20 24h20v4h-20zM44 24h4v4h-4zM8 28h4v4h-4zM20 28h16v4h-16zM44 28h4v4h-4zM8 32h16v4h-16zM32 32h16v4h-16zM8 36h40v4h-40zM16 40h24v4h-24z"/><path fill="#1f6fbf" d="M12 20h8v4h-8zM36 20h8v4h-8zM8 40h8v4h-8zM40 40h8v4h-8z"/><path fill="#0f3f72" d="M12 44h8v4h-8zM36 44h8v4h-8z"/><path fill="#155a9c" d="M24 32h8v4h-8z"/><path fill="#ffffff" d="M12 28h4v4h-4zM36 28h4v4h-4z"/><path fill="#10121f" d="M16 24h4v4h-4zM40 24h4v4h-4zM16 28h4v4h-4zM40 28h4v4h-4z"/></g></g>
      <text x="54" y="112" text-anchor="middle" class="model-name">PINÇAS</text>
    </g>
    <g transform="translate(360 14)">
      <rect class="model-card" width="108" height="126" rx="10"/>
      <g class="pixel pet-bob" color="#a66cff" transform="translate(26 20)"><g><path fill="currentColor" d="M0 4h8v4h-8zM48 4h8v4h-8zM0 8h8v4h-8zM48 8h8v4h-8zM4 12h8v4h-8zM44 12h8v4h-8z"/><path fill="currentColor" d="M12 8h32v4h-32zM16 12h24v4h-24zM16 16h24v4h-24zM8 20h40v4h-40zM8 24h40v4h-40zM8 28h4v4h-4zM20 28h16v4h-16zM44 28h4v4h-4zM8 32h16v4h-16zM32 32h16v4h-16zM8 36h40v4h-40zM16 40h24v4h-24z"/><path fill="#6f42c9" d="M16 4h24v4h-24zM8 40h8v4h-8zM40 40h8v4h-8zM8 44h4v4h-4zM44 44h4v4h-4z"/><path fill="#39236b" d="M12 44h8v4h-8zM36 44h8v4h-8z"/><path fill="#4f2f94" d="M24 32h8v4h-8z"/><path fill="#10121f" d="M12 28h8v4h-8zM36 28h8v4h-8z"/></g></g>
      <text x="54" y="112" text-anchor="middle" class="model-name">GUARDIÃO</text>
