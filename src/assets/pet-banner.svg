<svg xmlns="http://www.w3.org/2000/svg" width="820" height="220" viewBox="0 0 820 220">
  <defs>
    <style>
      .bg { fill: #0f0f17; }
      .card { fill: #1a1a2e; rx: 16; }
      .title { font-family: 'Courier New', monospace; font-weight: 900; fill: #ffffff; font-size: 38px; letter-spacing: -1px; }
      .sub   { font-family: 'Courier New', monospace; fill: #7a7a9a; font-size: 14px; }
      .tag   { font-family: 'Courier New', monospace; fill: #ff4757; font-size: 12px; font-weight: bold; }
      .pixel { animation: walk 0.55s steps(1) infinite; }
      @keyframes walk {
        0%,100% { transform: translate(0,0); }
        50%     { transform: translate(0,2px); }
      }
      @keyframes bounce {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(-6px); }
      }
      @keyframes blink {
        0%,90%,100% { opacity:1; }
        92%,98%     { opacity:0; }
      }
      .pet-group { animation: bounce 1.2s ease-in-out infinite; }
      .eye       { animation: blink 4s ease-in-out infinite; }
    </style>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="220" rx="18" fill="url(#grad)" />

  <!-- Accent line -->
  <rect x="0" y="0" width="820" height="4" rx="2" fill="#c71515" opacity="0.8"/>

  <!-- Grid dots decoration -->
  <g opacity="0.05" fill="#ffffff">
    <circle cx="60"  cy="40" r="2"/><circle cx="100" cy="40" r="2"/><circle cx="140" cy="40" r="2"/>
    <circle cx="60"  cy="80" r="2"/><circle cx="100" cy="80" r="2"/><circle cx="140" cy="80" r="2"/>
    <circle cx="60" cy="120" r="2"/><circle cx="100" cy="120" r="2"/><circle cx="140" cy="120" r="2"/>
    <circle cx="660" cy="40" r="2"/><circle cx="700" cy="40" r="2"/><circle cx="740" cy="40" r="2"/>
    <circle cx="660" cy="80" r="2"/><circle cx="700" cy="80" r="2"/><circle cx="740" cy="80" r="2"/>
  </g>

  <!-- PET PIXEL ART — cada quadrado = 7px -->
  <g class="pet-group" transform="translate(60, 42)" filter="url(#glow)">
    <!-- Orelhas -->
    <rect x="7"  y="0"  width="7" height="7" fill="#c71515"/>
    <rect x="14" y="0"  width="7" height="7" fill="#c71515"/>
    <rect x="63" y="0"  width="7" height="7" fill="#c71515"/>
    <rect x="70" y="0"  width="7" height="7" fill="#c71515"/>
    <!-- Cabeça topo -->
    <rect x="14" y="7"  width="7" height="7" fill="#c71515"/>
    <rect x="21" y="7"  width="7" height="7" fill="#c71515"/>
    <rect x="28" y="7"  width="7" height="7" fill="#c71515"/>
    <rect x="35" y="7"  width="7" height="7" fill="#c71515"/>
    <rect x="42" y="7"  width="7" height="7" fill="#c71515"/>
    <rect x="49" y="7"  width="7" height="7" fill="#c71515"/>
    <rect x="56" y="7"  width="7" height="7" fill="#c71515"/>
    <rect x="63" y="7"  width="7" height="7" fill="#c71515"/>
    <!-- Rosto com olhos -->
    <rect x="14" y="14" width="7" height="7" fill="#c71515"/>
    <rect x="21" y="14" width="7" height="7" fill="#111" class="eye"/>
    <rect x="28" y="14" width="7" height="7" fill="#c71515"/>
    <rect x="35" y="14" width="7" height="7" fill="#c71515"/>
    <rect x="42" y="14" width="7" height="7" fill="#c71515"/>
    <rect x="49" y="14" width="7" height="7" fill="#111" class="eye"/>
    <rect x="56" y="14" width="7" height="7" fill="#c71515"/>
    <rect x="63" y="14" width="7" height="7" fill="#c71515"/>
    <!-- Focinho -->
    <rect x="14" y="21" width="7" height="7" fill="#c71515"/>
    <rect x="21" y="21" width="7" height="7" fill="#c71515"/>
    <rect x="28" y="21" width="7" height="7" fill="#c71515"/>
    <rect x="35" y="21" width="7" height="7" fill="#c71515"/>
    <rect x="42" y="21" width="7" height="7" fill="#c71515"/>
    <rect x="49" y="21" width="7" height="7" fill="#c71515"/>
    <rect x="56" y="21" width="7" height="7" fill="#c71515"/>
    <rect x="63" y="21" width="7" height="7" fill="#c71515"/>
    <!-- Corpo superior -->
    <rect x="0"  y="28" width="7" height="7" fill="#c71515"/>
    <rect x="7"  y="28" width="7" height="7" fill="#c71515"/>
    <rect x="14" y="28" width="7" height="7" fill="#c71515"/>
    <rect x="21" y="28" width="7" height="7" fill="#c71515"/>
    <rect x="28" y="28" width="7" height="7" fill="#c71515"/>
    <rect x="35" y="28" width="7" height="7" fill="#c71515"/>
    <rect x="42" y="28" width="7" height="7" fill="#c71515"/>
    <rect x="49" y="28" width="7" height="7" fill="#c71515"/>
    <rect x="56" y="28" width="7" height="7" fill="#c71515"/>
    <rect x="63" y="28" width="7" height="7" fill="#c71515"/>
    <rect x="70" y="28" width="7" height="7" fill="#c71515"/>
    <rect x="77" y="28" width="7" height="7" fill="#c71515"/>
    <!-- Corpo inferior -->
    <rect x="0"  y="35" width="7" height="7" fill="#c71515"/>
    <rect x="7"  y="35" width="7" height="7" fill="#c71515"/>
    <rect x="14" y="35" width="7" height="7" fill="#c71515"/>
    <rect x="21" y="35" width="7" height="7" fill="#c71515"/>
    <rect x="28" y="35" width="7" height="7" fill="#c71515"/>
    <rect x="35" y="35" width="7" height="7" fill="#c71515"/>
    <rect x="42" y="35" width="7" height="7" fill="#c71515"/>
    <rect x="49" y="35" width="7" height="7" fill="#c71515"/>
    <rect x="56" y="35" width="7" height="7" fill="#c71515"/>
    <rect x="63" y="35" width="7" height="7" fill="#c71515"/>
    <rect x="70" y="35" width="7" height="7" fill="#c71515"/>
    <rect x="77" y="35" width="7" height="7" fill="#c71515"/>
    <!-- Cintura -->
    <rect x="14" y="42" width="7" height="7" fill="#c71515"/>
    <rect x="21" y="42" width="7" height="7" fill="#c71515"/>
    <rect x="28" y="42" width="7" height="7" fill="#c71515"/>
    <rect x="35" y="42" width="7" height="7" fill="#c71515"/>
    <rect x="42" y="42" width="7" height="7" fill="#c71515"/>
    <rect x="49" y="42" width="7" height="7" fill="#c71515"/>
    <rect x="56" y="42" width="7" height="7" fill="#c71515"/>
    <rect x="63" y="42" width="7" height="7" fill="#c71515"/>
    <!-- Pernas -->
    <rect x="14" y="49" width="7" height="7" fill="#c71515"/>
    <rect x="28" y="49" width="7" height="7" fill="#c71515"/>
    <rect x="49" y="49" width="7" height="7" fill="#c71515"/>
    <rect x="63" y="49" width="7" height="7" fill="#c71515"/>
    <rect x="14" y="56" width="7" height="7" fill="#c71515"/>
    <rect x="28" y="56" width="7" height="7" fill="#c71515"/>
    <rect x="49" y="56" width="7" height="7" fill="#c71515"/>
    <rect x="63" y="56" width="7" height="7" fill="#c71515"/>
    <!-- Sombra -->
    <ellipse cx="42" cy="70" rx="36" ry="5" fill="rgba(0,0,0,0.3)"/>
  </g>

  <!-- Name tag abaixo do pet -->
  <rect x="55" y="168" width="100" height="22" rx="11" fill="#ffffff" opacity="0.92"/>
  <rect x="55" y="168" width="100" height="22" rx="11" fill="none" stroke="#c71515" stroke-width="2"/>
  <text x="105" y="183" text-anchor="middle" font-family="'Courier New',monospace" font-weight="bold" font-size="12" fill="#1a1a2e">Claw'd</text>

  <!-- Text area -->
  <text x="200" y="70"  class="title">Claw'd</text>
  <text x="200" y="98"  class="sub">Companheiro de navegação pixel-art</text>
  <text x="200" y="98"  class="sub">Companheiro de navegação pixel-art</text>

  <!-- Tags / badges -->
  <rect x="200" y="112" width="110" height="22" rx="6" fill="rgba(199,21,21,0.15)" stroke="#c71515" stroke-width="1"/>
  <text x="255" y="127" text-anchor="middle" class="tag">🎨 Personalizável</text>

  <rect x="320" y="112" width="100" height="22" rx="6" fill="rgba(46,204,113,0.12)" stroke="#2ecc71" stroke-width="1"/>
  <text x="370" y="127" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#2ecc71">🖱️ Arrastável</text>

  <rect x="430" y="112" width="110" height="22" rx="6" fill="rgba(52,152,219,0.12)" stroke="#3498db" stroke-width="1"/>
  <text x="485" y="127" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="#3498db">⚡ Interativo</text>

  <!-- Feature list -->
  <text x="200" y="162" font-family="'Courier New',monospace" font-size="12" fill="#7a7a9a">✓ Múltiplos estados  ✓ Balão de fala  ✓ Auto-movimento</text>
  <text x="200" y="182" font-family="'Courier New',monospace" font-size="12" fill="#7a7a9a">✓ Dark UI popup     ✓ Reação ao scroll ✓ Touch support</text>

  <!-- Version badge -->
  <rect x="740" y="12" width="60" height="22" rx="6" fill="rgba(199,21,21,0.2)" stroke="#c71515" stroke-width="1"/>
  <text x="770" y="27" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="bold" fill="#ff4757">v 2.0</text>
</svg>
