<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">Claw'd — companheiro de navegação pixel-art</title>
  <desc id="desc">Banner da versão 3.2 com o modelo clássico e miniaturas dos quatro modelos pixel-art.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111322"/>
      <stop offset="1" stop-color="#090a12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff3d57"/>
      <stop offset="1" stop-color="#c71515"/>
    </linearGradient>
    <filter id="pet-shadow" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity=".42"/>
    </filter>
    <symbol id="pet-classic" viewBox="0 0 44 32">
      <path fill="currentColor" d="M8 0h28v12H8zM0 12h44v8H0zM8 20h28v4H8zM8 24h4v8H8zM16 24h4v8h-4zM24 24h4v8h-4zM32 24h4v8h-4z"/>
    </symbol>
    <symbol id="pet-mini" viewBox="0 0 44 32">
      <path fill="currentColor" d="M12 0h20v12H12zM4 12h36v8H4zM12 20h20v4H12zM12 24h8v8h-8zM24 24h8v8h-8z"/>
    </symbol>
    <symbol id="pet-claws" viewBox="0 0 44 32">
      <path fill="currentColor" d="M8 0h28v4H8zM0 4h44v12H0zM4 16h36v4H4zM8 20h28v4H8zM8 24h4v8H8zM16 24h4v8h-4zM24 24h4v8h-4zM32 24h4v8h-4z"/>
    </symbol>
    <symbol id="pet-guardian" viewBox="0 0 44 32">
      <path fill="currentColor" d="M4 0h36v12H4zM0 12h44v8H0zM4 20h36v4H4zM4 24h4v8H4zM12 24h4v8h-4zM28 24h4v8h-4zM36 24h4v8h-4z"/>
    </symbol>
    <style>
      text { font-family: "Courier New", monospace; }
      .pixel { shape-rendering: crispEdges; }
      .label { fill: #8f97bd; font-size: 11px; font-weight: 700; letter-spacing: .7px; }
      .model-name { fill: #f7f8ff; font-size: 11px; font-weight: 700; }
      .model-card { fill: #171a2b; stroke: #2d3351; stroke-width: 1; }
      @media (prefers-reduced-motion: no-preference) {
        .hero-pet { animation: clawd-banner-float 2.6s steps(2, end) infinite; transform-origin: 105px 104px; }
        .hero-eyes { animation: clawd-banner-blink 4.8s steps(1, end) infinite; }
      }
      @keyframes clawd-banner-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
      @keyframes clawd-banner-blink { 0%,94%,100% { opacity: 1; } 95%,98% { opacity: 0; } }
    </style>
  </defs>

  <rect width="920" height="260" rx="20" fill="url(#background)"/>
  <path d="M20 0h880a20 20 0 0 1 20 20v2H0v-2A20 20 0 0 1 20 0z" fill="url(#accent)"/>
  <path d="M0 194h920" stroke="#252941" stroke-width="1"/>

  <g class="pixel" filter="url(#pet-shadow)" color="#e11920" transform="translate(39 52) scale(3)">
    <g class="hero-pet">
      <use href="#pet-classic"/>
      <g class="hero-eyes" fill="#08080b"><path d="M12 4h4v4h-4zM28 4h4v4h-4z"/></g>
    </g>
  </g>
  <rect x="55" y="166" width="101" height="28" rx="5" fill="#f7f8ff" stroke="#ff3d57" stroke-width="3"/>
  <text x="105.5" y="184.5" text-anchor="middle" font-size="14" font-weight="900" fill="#171825">Claw'd</text>

  <text x="204" y="72" fill="#ffffff" font-size="42" font-weight="900" letter-spacing="-2">Claw'd</text>
  <text x="204" y="99" fill="#a3abd2" font-size="15">Seu companheiro de navegação pixel-art.</text>
  <text x="204" y="126" fill="#ff566b" font-size="12" font-weight="800" letter-spacing="1.4">ESTÚDIO VISUAL v3.2</text>

  <g transform="translate(204 142)">
    <rect width="112" height="30" rx="7" fill="#201724" stroke="#7b2736"/>
    <text x="56" y="19" text-anchor="middle" fill="#ff7183" font-size="11" font-weight="800">4 MODELOS</text>
    <rect x="122" width="104" height="30" rx="7" fill="#161e29" stroke="#27445d"/>
    <text x="174" y="19" text-anchor="middle" fill="#62c2ff" font-size="11" font-weight="800">4 ROSTOS</text>
    <rect x="236" width="130" height="30" rx="7" fill="#19231f" stroke="#276044"/>
    <text x="301" y="19" text-anchor="middle" fill="#65e6a4" font-size="11" font-weight="800">14 ACESSÓRIOS</text>
  </g>

  <g transform="translate(458 38)">
    <text x="0" y="0" class="label">MODELOS COMBINÁVEIS</text>
    <g transform="translate(0 14)">
      <rect class="model-card" width="102" height="126" rx="10"/>
      <g class="pixel" color="#e11920" transform="translate(7 22) scale(2)"><use href="#pet-classic"/><path fill="#08080b" d="M12 4h4v4h-4zM28 4h4v4h-4z"/></g>
      <text x="51" y="112" text-anchor="middle" class="model-name">CLÁSSICO</text>
    </g>
    <g transform="translate(112 14)">
      <rect class="model-card" width="102" height="126" rx="10"/>
      <g class="pixel" color="#ff9f43" transform="translate(7 22) scale(2)"><use href="#pet-mini"/><path fill="#08080b" d="M12 4h4v4h-4zM28 4h4v4h-4z"/></g>
      <text x="51" y="112" text-anchor="middle" class="model-name">MINI</text>
    </g>
    <g transform="translate(224 14)">
      <rect class="model-card" width="102" height="126" rx="10"/>
      <g class="pixel" color="#35a7ff" transform="translate(7 22) scale(2)"><use href="#pet-claws"/><path fill="#08080b" d="M12 4h4v4h-4zM28 4h4v4h-4z"/></g>
      <text x="51" y="112" text-anchor="middle" class="model-name">PINÇAS</text>
    </g>
    <g transform="translate(336 14)">
      <rect class="model-card" width="102" height="126" rx="10"/>
      <g class="pixel" color="#a66cff" transform="translate(7 22) scale(2)"><use href="#pet-guardian"/><path fill="#08080b" d="M12 4h4v4h-4zM28 4h4v4h-4z"/></g>
      <text x="51" y="112" text-anchor="middle" class="model-name">GUARDIÃO</text>
    </g>
  </g>

  <text x="204" y="224" fill="#9299bd" font-size="12">CORPO ESTÁTICO</text>
  <rect x="322" y="214" width="4" height="12" fill="#ff3d57"/>
  <text x="339" y="224" fill="#9299bd" font-size="12">PERNAS EM MOVIMENTO</text>
  <rect x="511" y="214" width="4" height="12" fill="#ff3d57"/>
  <text x="528" y="224" fill="#9299bd" font-size="12">OLHOS INDEPENDENTES</text>
  <rect x="718" y="214" width="4" height="12" fill="#ff3d57"/>
  <text x="735" y="224" fill="#9299bd" font-size="12">100% CSS</text>
</svg>
